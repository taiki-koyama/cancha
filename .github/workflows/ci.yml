name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  # ----------------------------------------
  # バックエンド：単体テスト（pytest）
  # ----------------------------------------
  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 依存関係インストール
        run: pip install -r requirements.txt

      - name: テスト実行
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///./test.db  # テスト用インメモリDB

  # ----------------------------------------
  # フロントエンド：単体テスト（Vitest）
  # ----------------------------------------
  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 依存関係インストール
        run: npm ci

      - name: テスト実行
        run: npm run test

  # ----------------------------------------
  # E2E テスト（Playwright）
  # backend-test と frontend-test が通過後に実行
  # ----------------------------------------
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: バックエンド依存関係インストール
        run: pip install -r requirements.txt
        working-directory: backend

      - name: フロントエンド依存関係インストール
        run: npm ci
        working-directory: frontend

      - name: Playwright ブラウザインストール
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: バックエンド起動（バックグラウンド）
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test.db

      - name: フロントエンドビルド・プレビュー起動
        run: |
          npm run build
          npm run preview -- --port 5173 &
        working-directory: frontend

      - name: サーバー起動待機
        run: npx wait-on http://localhost:5173 http://localhost:8000/docs --timeout 30000
        working-directory: frontend

      - name: E2E テスト実行
        run: npx playwright test
        working-directory: frontend

      - name: テスト結果アップロード（失敗時）
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
