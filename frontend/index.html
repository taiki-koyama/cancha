<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cancha</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
    .card { background: white; padding: 2rem 3rem; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); text-align: center; width: 480px; }
    h1 { color: #2d6a4f; }
    button { margin-top: 1rem; padding: 0.6rem 1.5rem; background: #000; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #333; }
    #result { margin-top: 1rem; color: #555; }
    .chat-box { margin-top: 1.5rem; text-align: left; border-top: 1px solid #eee; padding-top: 1rem; }
    .chat-log { height: 200px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; padding: 0.5rem; margin-bottom: 0.5rem; font-size: 0.9rem; background: #fafafa; }
    .msg-user { color: #1a1a1a; margin: 4px 0; }
    .msg-ai { color: #2d6a4f; margin: 4px 0; }
    .chat-input-row { display: flex; gap: 0.5rem; }
    .chat-input-row input { flex: 1; padding: 0.5rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
    .chat-input-row button { margin-top: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>cancha</h1>
    <p>インフラ動作確認</p>
    <button onclick="callApi()">API を叩く</button>
    <div id="result"></div>
    <div class="chat-box">
      <div class="chat-log" id="chat-log"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter') sendChat()" />
        <button onclick="sendChat()">送信</button>
      </div>
    </div>
  </div>
  <script>
    async function callApi() {
      const el = document.getElementById('result');
      try {
        const res = await fetch('/api/hello');
        const data = await res.json();
        el.textContent = 'バックエンドと繋がっています';
      } catch (e) {
        el.textContent = 'エラー: ' + e.message;
      }
    }

    async function sendChat() {
      const input = document.getElementById('chat-input');
      const log = document.getElementById('chat-log');
      const message = input.value.trim();
      if (!message) return;
      input.value = '';

      log.innerHTML += `<div class="msg-user">あなた: ${message}</div>`;
      log.scrollTop = log.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        const reply = res.ok ? data.reply : 'エラー: ' + data.detail;
        log.innerHTML += `<div class="msg-ai">AI: ${reply}</div>`;
      } catch (e) {
        log.innerHTML += `<div class="msg-ai">エラー: ${e.message}</div>`;
      }
      log.scrollTop = log.scrollHeight;
    }
  </script>
</body>
</html>
