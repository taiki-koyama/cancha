version: 0.2

# CodeBuild 環境変数（CodePipeline または CodeBuild プロジェクトで設定）
# AWS_ACCOUNT_ID    : AWSアカウントID（例：123456789012）
# AWS_REGION        : デプロイ先リージョン（例：ap-northeast-1）
# ECR_REPO_NAME     : ECR リポジトリ名（例：cancha-backend）
# S3_BUCKET_FRONTEND: フロントエンド配信用 S3 バケット名
# ECS_CLUSTER       : ECS クラスター名
# ECS_SERVICE       : ECS サービス名
# CF_DISTRIBUTION_ID: CloudFront ディストリビューション ID

phases:
  install:
    runtime-versions:
      python: 3.12
      nodejs: 20
    commands:
      - echo "=== 依存関係インストール ==="
      - pip install -r backend/requirements.txt
      - cd frontend && npm ci && cd ..

  pre_build:
    commands:
      - echo "=== ECR ログイン ==="
      - aws ecr get-login-password --region $AWS_REGION |
          docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - ECR_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - echo "IMAGE_TAG=$IMAGE_TAG"

  build:
    commands:
      # --- バックエンド：Docker ビルド ---
      - echo "=== FastAPI Docker イメージビルド ==="
      - docker build -t $ECR_URI:$IMAGE_TAG -t $ECR_URI:latest ./backend

      # --- フロントエンド：React ビルド ---
      - echo "=== React ビルド ==="
      - cd frontend && npm run build && cd ..

  post_build:
    commands:
      # --- ECR プッシュ ---
      - echo "=== ECR プッシュ ==="
      - docker push $ECR_URI:$IMAGE_TAG
      - docker push $ECR_URI:latest

      # --- S3 デプロイ（フロントエンド）---
      - echo "=== S3 アップロード ==="
      - aws s3 sync frontend/dist s3://$S3_BUCKET_FRONTEND --delete

      # --- ECS タスク定義更新 & サービス更新 ---
      - echo "=== ECS タスク定義を新イメージで更新 ==="
      - |
        CURRENT_TASK_DEF=$(aws ecs describe-task-definition --task-definition cancha-backend --region $AWS_REGION)
        NEW_TASK_DEF=$(echo "$CURRENT_TASK_DEF" | python3 -c "
        import json, sys
        d = json.load(sys.stdin)['taskDefinition']
        d['containerDefinitions'][0]['image'] = '$ECR_URI:$IMAGE_TAG'
        for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
            d.pop(k, None)
        print(json.dumps(d))
        ")
        NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --region $AWS_REGION --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
        echo "New task def: $NEW_TASK_DEF_ARN"
        aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --task-definition $NEW_TASK_DEF_ARN \
          --region $AWS_REGION

      # --- CloudFront キャッシュ無効化 ---
      - echo "=== CloudFront キャッシュ無効化 ==="
      - aws cloudfront create-invalidation
          --distribution-id $CF_DISTRIBUTION_ID
          --paths "/*"

      - echo "=== デプロイ完了 ==="

artifacts:
  files:
    - "**/*"
  base-directory: frontend/dist
